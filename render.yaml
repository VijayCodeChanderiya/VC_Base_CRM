services:
  - type: web
    name: alphatech-crm-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: (npx prisma migrate deploy || (sleep 5 && npx prisma migrate deploy) || (sleep 10 && npx prisma migrate deploy)) && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 4000
